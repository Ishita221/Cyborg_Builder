<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyborg Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cyborg Builder</h1>
    <p>Pick your Qualities.Build your machine</p>
    <div id="qualities">
  <h3>Personality</h3>
  <label><input type="checkbox" value="brave">Brave</label>
  <label><input type="checkbox" value="cold">Cold</label>
  <label><input type="checkbox" value="calm">Calm</label>

  <h3>Intellect</h3>
  <label><input type="checkbox" value="logical">Logical</label>
  <label><input type="checkbox" value="creative">Creative</label>
  <label><input type="checkbox" value="intelligent">Intelligent</label>

  <h3>Domain</h3>
  <label><input type="checkbox" value="combat">Combat</label>
  <label><input type="checkbox" value="medic">Medic</label>
  <label><input type="checkbox" value="hacker">Hacker</label>

  <h3>Build</h3>
  <label><input type="checkbox" value="heavy">Heavy</label>
  <label><input type="checkbox" value="agile">Agile</label>
  <label><input type="checkbox" value="stealth">Stealth</label>
</div>
    <button id="buildbtn">build Cyborg</button>
    <div id="output"> </div>
    <div id="cyborg"></div>
    
    <script src="script.js"></script>
</body>
</html>
